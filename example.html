<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sidekick HTML Test Page</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #59656f;
      --paper: #f7f8fb;
      --surface: #ffffff;
      --line: #d9dee7;
      --blue: #2563eb;
      --green: #168a53;
      --coral: #d94f3d;
      --gold: #b7791f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.5;
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: 28px;
      align-items: center;
      min-height: 62vh;
    }

    h1 {
      margin: 0 0 16px;
      max-width: 12ch;
      font-size: clamp(2.4rem, 8vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      margin: 0;
    }

    .intro {
      max-width: 58ch;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    button,
    .link-button {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 16px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    button {
      color: #ffffff;
      background: var(--blue);
    }

    .link-button {
      color: var(--ink);
      background: #ffffff;
      border-color: var(--line);
    }

    .preview {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 16px 42px rgba(23, 32, 42, 0.12);
    }

    .preview img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
    }

    .preview-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.94rem;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      flex: 0 0 12px;
      border-radius: 50%;
      background: var(--green);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 28px;
    }

    .metric {
      min-height: 128px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .metric strong {
      display: block;
      margin-bottom: 8px;
      font-size: 2rem;
      line-height: 1;
    }

    .metric span {
      color: var(--muted);
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 28px;
    }

    .swatch {
      min-height: 72px;
      border-radius: 8px;
      border: 1px solid rgba(23, 32, 42, 0.16);
    }

    .blue {
      background: var(--blue);
    }

    .green {
      background: var(--green);
    }

    .coral {
      background: var(--coral);
    }

    .gold {
      background: var(--gold);
    }

    #result {
      margin-top: 16px;
      color: var(--muted);
      min-height: 1.5em;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 24px, 1040px);
        padding-top: 20px;
      }

      header,
      .metrics,
      .swatches {
        grid-template-columns: 1fr;
      }

      header {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <section aria-labelledby="page-title">
        <h1 id="page-title">HTML test page</h1>
        <p class="intro">
          A small standalone page for checking typography, responsive layout,
          image loading, colors, controls, and a tiny bit of JavaScript.
        </p>
        <div class="actions">
          <button id="run-check" type="button">Run check</button>
          <a class="link-button" href="#sample-content">View sample content</a>
        </div>
        <p id="result" role="status" aria-live="polite"></p>
      </section>

      <aside class="preview" aria-label="Image preview">
        <img
          src="https://picsum.photos/seed/chase-sidekick-html-test/960/600"
          alt="A generated placeholder landscape for testing image rendering"
          width="960"
          height="600"
        >
        <div class="preview-footer">
          <span>Image, borders, shadow, and aspect ratio</span>
          <span class="status-dot" aria-hidden="true"></span>
        </div>
      </aside>
    </header>

    <section id="sample-content" class="metrics" aria-label="Sample metrics">
      <article class="metric">
        <strong>3</strong>
        <span>Responsive columns</span>
      </article>
      <article class="metric">
        <strong>1</strong>
        <span>Interactive button</span>
      </article>
      <article class="metric">
        <strong>4</strong>
        <span>Color swatches</span>
      </article>
    </section>

    <section class="swatches" aria-label="Color swatches">
      <div class="swatch blue"></div>
      <div class="swatch green"></div>
      <div class="swatch coral"></div>
      <div class="swatch gold"></div>
    </section>
  </main>

  <script>
    const button = document.querySelector("#run-check");
    const result = document.querySelector("#result");

    button.addEventListener("click", () => {
      const now = new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      result.textContent = `Check completed at ${now}. The script is running.`;
    });
  </script>
</body>
</html>
