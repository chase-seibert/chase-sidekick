(async function showMeticulousBanner() {
    const bannerIsHidden = await cookieStore.get("meticulous-hide-banner");
    if (window.Meticulous?.isRunningAsTest || bannerIsHidden) {
        return;
    }

    
    
    
    
    let devNoticesPortal = document.getElementById('maestro-dev-notices');
    if (!devNoticesPortal) {
        devNoticesPortal = await new Promise((resolve) => {
            document.addEventListener('maestro:portal-ready', function() {
                resolve(document.getElementById('maestro-dev-notices'));
            });
        });
        
        
        if (!devNoticesPortal) {
            return;
        }
    }

    devNoticesPortal.innerHTML = `
        <div class="meticulous-disclosure" id="meticulous-disclosure-banner">
            <div class="text">
                <p class="title"><a href="https://www.meticulous.ai/">Meticulous</a> is recording.</p>
                <p class="usage-note">
                    Meticulous records: devbox sessions, unauthed office-ip prod sessions, and <code>dbx51.com</code> prod sessions, <em>including</em> ELM.
                    More info: <a href="https://dbx.link/meticulous-core">drl/meticulous-core</a>.
                </p>
            </div>
            <div class="controls">
                
                    <button class="dig-Button" id="meticulous-opt-out">Disable Recording for this Session</button>
                
                <button class="dig-Button" id="meticulous-devbox-hide">
                    Dismiss Banner
                    (for 24 hours)
                </button>
            </div>
        </div>
    `;

    
    const optOutLink = document.getElementById('meticulous-opt-out');
    optOutLink.addEventListener('click', function() {
        cookieStore.set("meticulous-suppress-session", "true").then(() => {
            const url = new URL(window.location.href);
            url.searchParams.set("session_meticulous_optout", "true");
            const params = [...url.searchParams].sort(); 
            url.search = new URLSearchParams(params).toString();
            window.location.href = url.toString();
        });
    });
    

    const devboxHideLink = document.getElementById('meticulous-devbox-hide');
    devboxHideLink.addEventListener('click', () => {
        cookieStore.set({
            name: "meticulous-hide-banner",
            value: true,
            expires: Date.now() + 1000 * 3600 * 24,
        }).then(() => {
            document.getElementById('meticulous-disclosure-banner').style.display = 'none';
        })
    });
})();
